spring:
  application:
    name: findex
  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
        highlight_sql: true
        use_sql_comments: false

  sql:
    init:
      continue-on-error: false
      encoding: UTF-8

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.jdbc.datasource.init: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /api-docs

app:
  scheduler:
    enabled: true
    sync-delay-ms: 86400000

  external-api:
    service-key: ${OPEN_API_SERVICE_KEY:}
    base-url: ${OPEN_API_BASE_URL:https://apis.data.go.kr}
